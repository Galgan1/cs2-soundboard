// Cole estas linhas no seu autoexec.cfg (crie se nao existir, em game\csgo\cfg)
bind "f3" "exec fala_atual"     // tecla-fantasma do TEXTO (o soundboard escreve e aperta)
bind "f11" "exec voz_locutor"   // mic do jogo = cabo virtual (soundboard fala)
bind "f12" "exec voz_normal"    // NAO USE F12 se tiver screenshot da Steam nela! troque a tecla
bind "f4" "exec voz_normal"     // volta do mic (o soundboard aperta sozinho)
